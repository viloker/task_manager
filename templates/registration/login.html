{% extends "base.html" %}

{% block content %}
{% if form.errors %}
<p>Your username or password is not correct</p>
{% endif %}

<h1>Login</h1>

{% if next %}
<p>Please login to see this page.</p>
{% endif %}


<form method="post" action="{% url 'login' %}">
  {% csrf_token %}
  {{ form.as_p }}
  <input type="submit" value="Log in">
  <input type="hidden" name="next" value="{{ next }}">
</form>
{% endblock %}
